name: Deploy WEEBAL ERP

# Trigger deployment on push to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build React Application
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_BASE_URL: https://accounts-api.weebalinfotech.com

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/home/weebalinfotech-accounts-erp/htdocs/accounts-erp.weebalinfotech.com/"
          strip_components: 2
          overwrite: true
          # Note: scp-action overwrites by default, but to ensure a clean directory,
          # we can use the 'rm' flag if the action version supports it, 
          # or rely on the overwrite flag with specific file selection.
          rm: true 

  deploy-backend:
    name: Update and Restart Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend # Stage backend update after frontend
    steps:
      - name: SSH into VPS and Deploy Backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }} # root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Navigate to the backend site directory
            echo "Navigating to backend site..."
            cd /home/weebalinfotech-accounts-api/htdocs/accounts-api.weebalinfotech.com/
            
            # 2. Pull the latest code from GitHub
            echo "Pulling latest changes from main branch..."
            git pull origin main
            
            # 3. Install/Update Python requirements using the site's specific venv
            echo "Updating Python dependencies..."
            /home/weebalinfotech-accounts-api/htdocs/accounts-api.weebalinfotech.com/venv/bin/pip install -r backend/requirements.txt
            
            # 4. Fix file ownership for the CloudPanel site user
            echo "Applying ownership fixes..."
            chown -R weebalinfotech-accounts-api:weebalinfotech-accounts-api /home/weebalinfotech-accounts-api/htdocs/accounts-api.weebalinfotech.com/
            
            # 5. Restart the Python Service using CloudPanel CLI
            echo "Restarting service..."
            clpctl python:restart --domainName=accounts-api.weebalinfotech.com
            echo "Deployment completed successfully!"

